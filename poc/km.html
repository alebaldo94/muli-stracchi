<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registra KM | I Muli Stracchi</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { "outline-variant":"#d0c6ab","inverse-surface":"#2f3131","surface-container-lowest":"#ffffff","surface-container-high":"#e8e8e8","primary-container":"#ffd700","on-background":"#1a1c1c","background":"#f9f9f9","surface-container-low":"#f3f3f3","outline":"#7e775f","surface-container":"#eeeeee","secondary":"#bc0003","on-secondary":"#ffffff","on-primary-container":"#705e00","surface":"#f9f9f9","on-surface-variant":"#4d4732","surface-container-highest":"#e2e2e2","primary":"#705d00","on-primary":"#ffffff","surface-dim":"#dadada","on-surface":"#1a1c1c","primary-fixed":"#ffe16d","on-primary-fixed":"#221b00","tertiary-container":"#dcd9d9","tertiary":"#5f5e5e","on-tertiary-fixed-variant":"#474746" },
        borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
        spacing: { "xs":"0.5rem","xl":"4rem","lg":"2.5rem","unit":"4px","sm":"1rem","md":"1.5rem","gutter":"1.5rem","margin":"2rem" },
        fontFamily: { "body-md":["Inter"],"headline-md":["Lexend"],"headline-xl":["Lexend"],"label-bold":["Lexend"],"body-lg":["Inter"] },
        fontSize: { "body-md":["16px",{"lineHeight":"1.5","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}],"headline-xl":["48px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"800"}],"label-bold":["14px",{"lineHeight":"1.0","fontWeight":"600"}],"body-lg":["18px",{"lineHeight":"1.6","fontWeight":"400"}] }
      }}
    }
  </script>
  <style>
    .asphalt-texture { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
  <div class="fixed inset-0 asphalt-texture pointer-events-none z-0"></div>
  <div id="sidebar-mount"></div>
  <div id="topbar-mount"></div>

  <main class="ml-64 p-margin relative z-10">
    <header class="mb-lg">
      <h2 class="font-headline-xl text-headline-xl uppercase italic leading-tight">Registra Attività</h2>
      <div class="h-1 w-24 bg-primary-container mt-xs"></div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">

      <!-- Strava + storico -->
      <section class="lg:col-span-4 flex flex-col gap-gutter">
        <!-- Strava -->
        <div class="bg-surface-container-lowest p-lg border-2 border-outline-variant shadow-sm relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1.5 h-full bg-secondary"></div>
          <h3 class="font-headline-md mb-md flex items-center gap-xs">
            <span class="material-symbols-outlined text-secondary">sync</span> Integrazione Veloce
          </h3>
          <p class="text-on-surface-variant text-sm mb-lg">Sincronizza i tuoi dati da Strava per mantenere aggiornato il tuo profilo.</p>
          <button onclick="mockStrava()" class="w-full py-md px-lg bg-[#FC4C02] text-white font-headline-md flex items-center justify-center gap-md shadow-lg hover:brightness-110 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-2xl">directions_run</span>
            <span>CONNETTI STRAVA</span>
          </button>
          <p class="text-xs text-on-surface-variant mt-md text-center">OAuth 2.0 · Dati solo in lettura</p>
        </div>

        <!-- Storico uscite -->
        <div class="bg-surface-container-lowest border-2 border-outline-variant shadow-sm p-md">
          <h3 class="font-headline-md mb-md flex items-center gap-xs">
            <span class="material-symbols-outlined text-primary">history</span> Storico Uscite
          </h3>
          <div id="rides-history" class="space-y-xs max-h-80 overflow-y-auto"></div>
        </div>
      </section>

      <!-- Form manuale -->
      <section class="lg:col-span-8">
        <div class="bg-surface-container-lowest p-lg border-2 border-outline-variant shadow-sm relative overflow-hidden">
          <div class="absolute top-0 right-0 w-1.5 h-full bg-primary-container"></div>
          <h3 class="font-headline-md mb-lg flex items-center gap-xs">
            <span class="material-symbols-outlined text-primary">edit_note</span> Inserimento Manuale
          </h3>
          <form id="ride-form" class="space-y-md">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
              <div class="space-y-xs">
                <label class="font-label-bold uppercase text-on-surface-variant text-xs">Titolo Attività *</label>
                <input id="f-title" required type="text" placeholder="Es. Giro del Lago"
                  class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm transition-all"/>
              </div>
              <div class="space-y-xs">
                <label class="font-label-bold uppercase text-on-surface-variant text-xs">Data *</label>
                <input id="f-date" required type="date"
                  class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm transition-all"/>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-md">
              <div class="space-y-xs">
                <label class="font-label-bold uppercase text-on-surface-variant text-xs">Distanza (KM) *</label>
                <div class="relative">
                  <input id="f-km" required type="number" step="0.1" min="0.1" placeholder="0.0"
                    class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm font-headline-md transition-all pr-12"/>
                  <span class="absolute right-md top-1/2 -translate-y-1/2 text-outline font-label-bold text-xs">KM</span>
                </div>
              </div>
              <div class="space-y-xs">
                <label class="font-label-bold uppercase text-on-surface-variant text-xs">Durata</label>
                <div class="relative">
                  <input id="f-duration" type="text" placeholder="2:30"
                    class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm font-headline-md transition-all pr-16"/>
                  <span class="absolute right-md top-1/2 -translate-y-1/2 text-outline font-label-bold text-xs">HH:MM</span>
                </div>
              </div>
              <div class="space-y-xs">
                <label class="font-label-bold uppercase text-on-surface-variant text-xs">Dislivello (+m)</label>
                <div class="relative">
                  <input id="f-elevation" type="number" min="0" placeholder="0"
                    class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm font-headline-md transition-all pr-10"/>
                  <span class="absolute right-md top-1/2 -translate-y-1/2 text-outline font-label-bold text-xs">M</span>
                </div>
              </div>
            </div>
            <div class="space-y-xs">
              <label class="font-label-bold uppercase text-on-surface-variant text-xs">Note</label>
              <textarea id="f-note" rows="3" placeholder="Com'è andata la pedalata?"
                class="w-full bg-surface border-2 border-outline-variant focus:border-primary-container focus:ring-0 px-md py-sm transition-all"></textarea>
            </div>
            <div class="pt-md">
              <button type="submit"
                class="w-full md:w-auto px-xl py-md bg-primary-container text-on-primary-container font-headline-md flex items-center justify-center gap-md border-b-4 border-primary hover:brightness-95 hover:-translate-y-0.5 active:translate-y-0 active:border-b-0 transition-all">
                <span>SALVA PEDALATA</span>
                <span class="material-symbols-outlined">arrow_forward</span>
              </button>
            </div>
          </form>
        </div>

        <div class="mt-gutter flex items-center gap-md p-md bg-tertiary-container/30 border-l-4 border-tertiary">
          <span class="material-symbols-outlined text-on-surface-variant">info</span>
          <p class="font-label-bold text-on-surface-variant text-sm italic">I km vengono aggregati nelle classifiche sociali mensilmente.</p>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="js/app.js"></script>
  <script>
    initStorage();
    const user = Auth.require();
    document.getElementById('sidebar-mount').outerHTML = renderSidebar('km');
    document.getElementById('topbar-mount').outerHTML = renderTopBar('Registra Attività');
    document.getElementById('footer-mount').outerHTML = renderFooter();

    // Set today as default date
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

    function loadHistory() {
      const rides = DB.getRides(user.id).reverse();
      const el = document.getElementById('rides-history');
      if (!rides.length) { el.innerHTML = '<p class="text-on-surface-variant text-sm">Nessuna uscita ancora.</p>'; return; }
      el.innerHTML = rides.map(r => `
        <div class="flex items-center justify-between p-sm bg-surface-container-low border border-outline-variant rounded">
          <div class="flex items-center gap-sm">
            <span class="material-symbols-outlined text-sm ${r.source === 'strava' ? 'text-orange-500' : 'text-primary'}">${r.source === 'strava' ? 'sync' : 'directions_bike'}</span>
            <div>
              <p class="font-label-bold text-sm">${r.title}</p>
              <p class="text-on-surface-variant text-xs">${formatDate(r.date)}</p>
            </div>
          </div>
          <div class="text-right flex-shrink-0 ml-sm">
            <p class="font-headline-md text-primary text-lg">${r.km}<span class="text-xs font-body-md">km</span></p>
            ${r.elevation ? `<p class="text-xs text-on-surface-variant">+${r.elevation}m</p>` : ''}
          </div>
        </div>`).join('');
    }

    document.getElementById('ride-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const km = parseFloat(document.getElementById('f-km').value);
      if (!km || km <= 0) { toast('Inserisci una distanza valida', 'error'); return; }
      DB.addRide(user.id, {
        title: document.getElementById('f-title').value,
        date: document.getElementById('f-date').value,
        km,
        duration: document.getElementById('f-duration').value || '—',
        elevation: parseInt(document.getElementById('f-elevation').value) || 0,
        note: document.getElementById('f-note').value
      });
      toast('Pedalata salvata! +' + km + ' km');
      this.reset();
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      loadHistory();
    });

    function mockStrava() {
      // Simulate Strava OAuth + import
      const btn = event.currentTarget;
      btn.textContent = 'Connessione in corso...';
      btn.disabled = true;
      setTimeout(() => {
        DB.addRide(user.id, { title: 'Importato da Strava', date: new Date().toISOString().split('T')[0], km: 42.5, duration: '1:38', elevation: 480, source: 'strava', note: 'Sync Strava' });
        toast('3 attività importate da Strava!');
        btn.innerHTML = '<span class="material-symbols-outlined text-2xl">check_circle</span><span>STRAVA CONNESSO</span>';
        btn.classList.replace('bg-[#FC4C02]', 'bg-green-600');
        loadHistory();
      }, 1500);
    }

    loadHistory();
  </script>
</body>
</html>
