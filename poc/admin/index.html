<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | I Muli Stracchi</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { "outline-variant":"#d0c6ab","inverse-surface":"#2f3131","surface-container-lowest":"#ffffff","surface-container-high":"#e8e8e8","primary-container":"#ffd700","on-background":"#1a1c1c","background":"#f9f9f9","surface-container-low":"#f3f3f3","outline":"#7e775f","surface-container":"#eeeeee","secondary":"#bc0003","on-secondary":"#ffffff","on-primary-container":"#705e00","surface":"#f9f9f9","on-surface-variant":"#4d4732","surface-container-highest":"#e2e2e2","primary":"#705d00","on-primary":"#ffffff","surface-dim":"#dadada","on-surface":"#1a1c1c","primary-fixed":"#ffe16d","on-primary-fixed":"#221b00","tertiary-fixed-dim":"#c8c6c5" },
        borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
        spacing: { "xs":"0.5rem","xl":"4rem","lg":"2.5rem","unit":"4px","sm":"1rem","md":"1.5rem","gutter":"1.5rem","margin":"2rem" },
        fontFamily: { "body-md":["Inter"],"headline-md":["Lexend"],"headline-xl":["Lexend"],"label-bold":["Lexend"],"body-lg":["Inter"] },
        fontSize: { "body-md":["16px",{"lineHeight":"1.5","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}],"headline-xl":["48px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"800"}],"label-bold":["14px",{"lineHeight":"1.0","fontWeight":"600"}],"body-lg":["18px",{"lineHeight":"1.6","fontWeight":"400"}] }
      }}
    }
  </script>
  <style>.asphalt-texture { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; }</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
  <div class="fixed inset-0 asphalt-texture pointer-events-none z-0"></div>
  <div id="sidebar-mount"></div>
  <div id="topbar-mount"></div>

  <main class="ml-64 p-margin relative z-10 space-y-gutter">
    <header class="flex items-center justify-between">
      <div>
        <h2 class="font-headline-xl text-headline-xl uppercase italic leading-tight">Admin Dashboard</h2>
        <div class="h-1 w-24 bg-secondary mt-xs"></div>
      </div>
      <div class="flex gap-sm">
        <a href="members.html" class="bg-primary-container text-on-primary-container font-label-bold px-md py-sm flex items-center gap-xs hover:brightness-95 transition-all border-b-4 border-primary">
          <span class="material-symbols-outlined text-sm">person_add</span> Aggiungi Socio
        </a>
        <a href="events.html" class="bg-inverse-surface text-white font-label-bold px-md py-sm flex items-center gap-xs hover:bg-gray-700 transition-all border-b-4 border-gray-500">
          <span class="material-symbols-outlined text-sm">event_available</span> Nuovo Evento
        </a>
      </div>
    </header>

    <!-- Alert urgenti -->
    <div id="alert-block"></div>

    <!-- Stats cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-gutter">
      <div class="bg-white border-t-4 border-primary shadow-sm p-md">
        <p class="font-label-bold text-on-surface-variant uppercase text-xs mb-xs">Soci Attivi</p>
        <p id="stat-members" class="font-headline-lg text-primary">—</p>
      </div>
      <div class="bg-white border-t-4 border-secondary shadow-sm p-md">
        <p class="font-label-bold text-on-surface-variant uppercase text-xs mb-xs">KM Totali (mese)</p>
        <p id="stat-km" class="font-headline-lg text-secondary">—</p>
      </div>
      <div class="bg-white border-t-4 border-inverse-surface shadow-sm p-md">
        <p class="font-label-bold text-on-surface-variant uppercase text-xs mb-xs">Eventi in Programma</p>
        <p id="stat-events" class="font-headline-lg text-on-surface">—</p>
      </div>
      <div class="bg-white border-t-4 border-outline shadow-sm p-md">
        <p class="font-label-bold text-on-surface-variant uppercase text-xs mb-xs">Uscite Registrate</p>
        <p id="stat-rides" class="font-headline-lg text-on-surface">—</p>
      </div>
    </div>

    <!-- Two columns -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter">

      <!-- Ultimi soci -->
      <div class="bg-surface-container-lowest border-2 border-outline-variant shadow-sm">
        <div class="border-t-4 border-primary p-md border-b border-outline-variant flex justify-between items-center">
          <h3 class="font-headline-md">Soci Recenti</h3>
          <a href="members.html" class="text-primary font-label-bold text-sm hover:underline">Gestisci →</a>
        </div>
        <div id="recent-members" class="divide-y divide-outline-variant"></div>
      </div>

      <!-- Prossimi eventi -->
      <div class="bg-surface-container-lowest border-2 border-outline-variant shadow-sm">
        <div class="border-t-4 border-secondary p-md border-b border-outline-variant flex justify-between items-center">
          <h3 class="font-headline-md">Prossimi Eventi</h3>
          <a href="events.html" class="text-primary font-label-bold text-sm hover:underline">Gestisci →</a>
        </div>
        <div id="recent-events" class="divide-y divide-outline-variant"></div>
      </div>
    </div>

    <!-- Top performers -->
    <div class="bg-surface-container-lowest border-2 border-outline-variant shadow-sm">
      <div class="border-t-4 border-primary-container p-md border-b border-outline-variant">
        <h3 class="font-headline-md">Top Performers — Maggio 2026</h3>
      </div>
      <div id="top-performers" class="p-md grid grid-cols-1 md:grid-cols-3 gap-gutter"></div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="../js/app.js"></script>
  <script>
    initStorage();
    Auth.require('admin');
    document.getElementById('sidebar-mount').outerHTML = renderAdminSidebar('dashboard');
    document.getElementById('topbar-mount').outerHTML = renderTopBar('Admin Panel');
    document.getElementById('footer-mount').outerHTML = renderFooter();

    function initPage() {
      const members = DB.getMembers();
      const events = DB.getEvents();
      const rides = DB.getAllRides();
      const now = new Date().toISOString().split('T')[0];

      document.getElementById('stat-members').textContent = members.length;
      document.getElementById('stat-km').textContent = members.reduce((s, m) => s + m.km_month, 0) + ' km';
      document.getElementById('stat-events').textContent = events.filter(e => e.date >= now).length;
      document.getElementById('stat-rides').textContent = rides.length;

      // Recent members (last 5 by joinDate)
      const recent = [...members].sort((a, b) => b.joinDate.localeCompare(a.joinDate)).slice(0, 5);
      document.getElementById('recent-members').innerHTML = recent.map(m => `
        <div class="flex items-center gap-md px-md py-sm hover:bg-surface-container transition-colors">
          <div class="w-9 h-9 rounded-full ${avatarBg(m.id)} flex items-center justify-center font-label-bold text-xs flex-shrink-0">${initials(m.name)}</div>
          <div class="flex-1 min-w-0">
            <p class="font-label-bold truncate">${m.name}</p>
            <p class="text-on-surface-variant text-xs">${m.city} · iscritto ${formatDate(m.joinDate)}</p>
          </div>
          <span class="px-xs py-0.5 text-xs font-label-bold rounded-full ${levelBadge(m.level)}">${levelLabel(m.level)}</span>
        </div>`).join('');

      // Upcoming events
      const upcoming = events.filter(e => e.date >= now).sort((a, b) => a.date.localeCompare(b.date)).slice(0, 5);
      document.getElementById('recent-events').innerHTML = upcoming.map(e => `
        <div class="flex items-center gap-md px-md py-sm hover:bg-surface-container transition-colors">
          <div class="bg-primary-container w-12 h-12 flex flex-col items-center justify-center flex-shrink-0 border border-outline-variant">
            <span class="text-xs font-label-bold uppercase">${new Date(e.date).toLocaleDateString('it-IT',{month:'short'})}</span>
            <span class="font-headline-md leading-none">${new Date(e.date).getDate()}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-label-bold truncate">${e.title}</p>
            <p class="text-on-surface-variant text-xs">${e.location} · ${e.distance}km · ${(e.participants||[]).length} iscritti</p>
          </div>
          <span class="text-xs ${e.category === 'strada' ? 'text-primary' : e.category === 'mtb' ? 'text-green-700' : 'text-amber-700'} font-label-bold uppercase">${categoryLabel(e.category)}</span>
        </div>`).join('') || '<p class="px-md py-sm text-on-surface-variant text-sm">Nessun evento in programma.</p>';

      // Top 3 performers
      const top3 = [...members].sort((a, b) => b.km_month - a.km_month).slice(0, 3);
      const medals = ['🥇', '🥈', '🥉'];
      document.getElementById('top-performers').innerHTML = top3.map((m, i) => `
        <div class="text-center p-md border border-outline-variant">
          <div class="text-4xl mb-sm">${medals[i]}</div>
          <div class="w-14 h-14 rounded-full ${avatarBg(m.id)} flex items-center justify-center font-extrabold text-lg mx-auto mb-sm">${initials(m.name)}</div>
          <p class="font-headline-md">${m.name}</p>
          <p class="text-on-surface-variant text-xs mb-sm">${m.city}</p>
          <p class="font-headline-lg text-primary">${m.km_month}<span class="text-sm font-body-md"> km</span></p>
          <p class="text-xs text-on-surface-variant">${m.rides_count} uscite</p>
        </div>`).join('');
    }

    function renderAlerts() {
      const pending = getPendingReminders();
      const urgent  = pending.filter(p => p.urgent);
      const el = document.getElementById('alert-block');
      if (!urgent.length) { el.innerHTML = ''; return; }

      const expired      = urgent.filter(p => p.type === 'tessera_expired').length;
      const noInsurance  = urgent.filter(p => p.type === 'insurance_missing' || p.type === 'insurance_expired').length;
      const expiring     = pending.filter(p => p.type === 'tessera_expiring').length;

      const items = [];
      if (expired)     items.push(`<strong>${expired}</strong> tessera/e scaduta/e`);
      if (noInsurance) items.push(`<strong>${noInsurance}</strong> soci senza assicurazione valida`);
      if (expiring)    items.push(`<strong>${expiring}</strong> tessera/e in scadenza entro 30gg`);

      el.innerHTML = `
        <div class="bg-red-50 border-2 border-red-300 border-l-4 border-l-red-600 p-md flex flex-col md:flex-row items-start md:items-center justify-between gap-sm">
          <div class="flex items-start gap-sm">
            <span class="material-symbols-outlined text-red-600 flex-shrink-0">warning</span>
            <div>
              <p class="font-label-bold text-red-700 uppercase text-xs tracking-wide mb-xs">Azioni richieste (${urgent.length} urgenti)</p>
              <p class="text-sm text-red-800">${items.join(' · ')}</p>
            </div>
          </div>
          <div class="flex gap-sm flex-shrink-0">
            <a href="tessere.html" class="bg-red-600 text-white font-label-bold px-md py-xs text-sm hover:bg-red-700 transition-all border-b-2 border-red-900 flex items-center gap-xs">
              <span class="material-symbols-outlined text-sm">card_membership</span> Gestisci Tessere
            </a>
            <a href="notifiche.html" class="bg-inverse-surface text-primary-fixed font-label-bold px-md py-xs text-sm hover:bg-gray-700 transition-all border-b-2 border-gray-600 flex items-center gap-xs">
              <span class="material-symbols-outlined text-sm">send</span> Invia Promemoria
            </a>
          </div>
        </div>`;
    }

    renderAlerts();
    initPage();
  </script>
</body>
</html>
