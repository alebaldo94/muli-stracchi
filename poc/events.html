<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventi | I Muli Stracchi</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { "outline-variant":"#d0c6ab","inverse-surface":"#2f3131","surface-container-lowest":"#ffffff","surface-container-high":"#e8e8e8","primary-container":"#ffd700","on-background":"#1a1c1c","background":"#f9f9f9","surface-container-low":"#f3f3f3","outline":"#7e775f","surface-container":"#eeeeee","secondary":"#bc0003","secondary-container":"#e41f16","on-secondary":"#ffffff","on-secondary-container":"#fffbff","on-primary-container":"#705e00","surface":"#f9f9f9","on-surface-variant":"#4d4732","surface-container-highest":"#e2e2e2","primary":"#705d00","on-primary":"#ffffff","surface-dim":"#dadada","inverse-on-surface":"#f1f1f1","on-surface":"#1a1c1c","primary-fixed":"#ffe16d","primary-fixed-dim":"#e9c400","on-primary-fixed":"#221b00","tertiary-fixed-dim":"#c8c6c5" },
        borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
        spacing: { "xs":"0.5rem","xl":"4rem","lg":"2.5rem","unit":"4px","sm":"1rem","md":"1.5rem","gutter":"1.5rem","margin":"2rem" },
        fontFamily: { "body-md":["Inter"],"headline-md":["Lexend"],"headline-xl":["Lexend"],"label-bold":["Lexend"],"headline-lg":["Lexend"],"body-lg":["Inter"] },
        fontSize: { "body-md":["16px",{"lineHeight":"1.5","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}],"headline-xl":["48px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"800"}],"label-bold":["14px",{"lineHeight":"1.0","fontWeight":"600"}],"headline-lg":["32px",{"lineHeight":"1.2","fontWeight":"700"}],"body-lg":["18px",{"lineHeight":"1.6","fontWeight":"400"}] }
      }}
    }
  </script>
  <style>
    .asphalt-texture { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
  <div class="fixed inset-0 asphalt-texture pointer-events-none z-0"></div>
  <div id="sidebar-mount"></div>
  <div id="topbar-mount"></div>

  <main class="ml-64 p-margin relative z-10">
    <!-- Header -->
    <div class="mb-lg flex flex-col md:flex-row md:items-end justify-between gap-md">
      <div>
        <h2 class="font-headline-xl text-headline-xl uppercase italic leading-tight">Eventi Al Passo</h2>
        <p class="text-on-surface-variant font-body-lg max-w-xl mt-xs">Mettiti alla prova sulle strade più iconiche delle Marche.</p>
      </div>
      <!-- Filter -->
      <div class="flex border-2 border-on-background bg-surface overflow-hidden flex-shrink-0">
        <button onclick="setFilter('all')" data-cat="all" class="filter-btn px-md py-sm font-label-bold uppercase bg-primary-container text-on-primary-container border-r-2 border-on-background">Tutti</button>
        <button onclick="setFilter('strada')" data-cat="strada" class="filter-btn px-md py-sm font-label-bold uppercase hover:bg-surface-container border-r-2 border-on-background transition-colors">Strada</button>
        <button onclick="setFilter('mtb')" data-cat="mtb" class="filter-btn px-md py-sm font-label-bold uppercase hover:bg-surface-container border-r-2 border-on-background transition-colors">MTB</button>
        <button onclick="setFilter('gravel')" data-cat="gravel" class="filter-btn px-md py-sm font-label-bold uppercase hover:bg-surface-container transition-colors">Gravel</button>
      </div>
    </div>

    <!-- Events grid -->
    <div id="events-grid" class="grid grid-cols-1 lg:grid-cols-12 gap-gutter"></div>
  </main>

  <!-- FAB -->
  <a href="km.html" class="fixed bottom-lg right-lg w-16 h-16 bg-primary-container text-on-primary-container rounded-full shadow-lg flex items-center justify-center border-4 border-on-background hover:rotate-12 transition-transform z-50">
    <span class="material-symbols-outlined text-3xl">directions_bike</span>
  </a>

  <div id="footer-mount"></div>

  <script src="js/app.js"></script>
  <script>
    initStorage();
    const user = Auth.require();
    document.getElementById('sidebar-mount').outerHTML = renderSidebar('events');
    document.getElementById('topbar-mount').outerHTML = renderTopBar('Eventi Al Passo');
    document.getElementById('footer-mount').outerHTML = renderFooter();

    let currentFilter = 'all';

    function setFilter(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('bg-primary-container', btn.dataset.cat === cat);
        btn.classList.toggle('text-on-primary-container', btn.dataset.cat === cat);
      });
      renderEvents();
    }

    function renderEvents() {
      const events = DB.getEvents().filter(e => currentFilter === 'all' || e.category === currentFilter)
                                   .sort((a, b) => a.date.localeCompare(b.date));
      const grid = document.getElementById('events-grid');
      if (!events.length) { grid.innerHTML = '<p class="col-span-12 text-on-surface-variant py-xl text-center">Nessun evento per questa categoria.</p>'; return; }

      grid.innerHTML = events.map((ev, i) => {
        const isJoined = (ev.participants || []).includes(user.id);
        const pCount = (ev.participants || []).length;
        const levelColors = { hard: 'bg-secondary text-white', advanced: 'bg-red-100 text-red-800', intermediate: 'bg-yellow-100 text-yellow-800', easy: 'bg-green-100 text-green-800' };
        const lvlClass = levelColors[ev.level] || 'bg-gray-100 text-gray-700';
        const catIcon = { strada: 'road', mtb: 'forest', gravel: 'terrain' }[ev.category] || 'directions_bike';

        if (i === 0) {
          // Featured card
          return `<div class="lg:col-span-8 bg-surface-container-lowest border border-outline-variant shadow-sm flex flex-col md:flex-row overflow-hidden group">
            <div class="md:w-2/5 relative bg-gradient-to-br from-inverse-surface to-gray-600 flex items-center justify-center min-h-[200px]">
              <span class="material-symbols-outlined text-8xl text-white/20">directions_bike</span>
              <div class="absolute top-0 left-0 bg-secondary text-on-secondary px-sm py-xs font-label-bold uppercase italic text-xs">Featured Ride</div>
            </div>
            <div class="md:w-3/5 p-lg flex flex-col justify-between border-t-4 border-primary md:border-t-0 md:border-l-4">
              <div>
                <div class="flex items-center gap-xs text-secondary font-label-bold uppercase text-xs mb-xs">
                  <span class="material-symbols-outlined text-sm">calendar_today</span> ${formatDate(ev.date).toUpperCase()}
                </div>
                <h3 class="font-headline-lg uppercase mb-sm">${ev.title}</h3>
                <div class="flex items-center gap-xs text-on-surface-variant font-label-bold text-sm mb-md">
                  <span class="material-symbols-outlined text-sm">location_on</span> ${ev.location.toUpperCase()}
                </div>
                <div class="grid grid-cols-3 gap-md mb-md">
                  <div class="bg-surface-container-low p-sm"><p class="text-xs font-label-bold text-on-surface-variant uppercase">Distanza</p><p class="font-headline-md text-primary">${ev.distance}<span class="text-sm font-body-md">km</span></p></div>
                  <div class="bg-surface-container-low p-sm"><p class="text-xs font-label-bold text-on-surface-variant uppercase">Dislivello</p><p class="font-headline-md text-primary">${ev.elevation}<span class="text-sm font-body-md">m</span></p></div>
                  <div class="bg-surface-container-low p-sm"><p class="text-xs font-label-bold text-on-surface-variant uppercase">Iscritti</p><p class="font-headline-md text-primary">${pCount}</p></div>
                </div>
                <p class="text-on-surface-variant text-sm">${ev.description}</p>
              </div>
              <button onclick="toggleJoin(${ev.id}, ${isJoined})"
                class="mt-md bg-on-background text-background font-label-bold py-md px-lg uppercase flex items-center justify-center gap-md hover:bg-primary hover:text-on-primary transition-all active:scale-95 ${isJoined ? 'bg-primary text-on-primary' : ''}">
                ${isJoined ? '✓ SEI ISCRITTO' : 'JOIN THE PACK'} <span class="material-symbols-outlined">arrow_forward</span>
              </button>
            </div>
          </div>`;
        }

        // Standard card
        return `<div class="lg:col-span-${i === 1 ? '4' : '6'} bg-surface-container-lowest border border-outline-variant shadow-sm flex flex-col overflow-hidden">
          <div class="bg-gradient-to-br from-inverse-surface to-gray-600 h-40 flex items-center justify-center relative">
            <span class="material-symbols-outlined text-6xl text-white/20">${catIcon}</span>
            <div class="absolute inset-0 bg-gradient-to-t from-on-background/70 to-transparent flex items-end p-md">
              <div>
                <span class="${lvlClass} px-xs py-1 text-xs font-label-bold uppercase italic">${levelLabel(ev.level)}</span>
                <h3 class="font-headline-md text-white uppercase mt-xs">${ev.title}</h3>
              </div>
            </div>
          </div>
          <div class="p-md flex-1 flex flex-col justify-between border-t-4 ${isJoined ? 'border-primary' : 'border-secondary'}">
            <div class="space-y-xs text-sm mb-md">
              <div class="flex justify-between"><span class="font-label-bold uppercase text-on-surface-variant text-xs">Data:</span><span>${formatDate(ev.date)}</span></div>
              <div class="flex justify-between"><span class="font-label-bold uppercase text-on-surface-variant text-xs">Luogo:</span><span>${ev.location}</span></div>
              <div class="flex justify-between"><span class="font-label-bold uppercase text-on-surface-variant text-xs">Distanza:</span><span class="font-bold">${ev.distance} km · +${ev.elevation}m</span></div>
              <div class="flex justify-between"><span class="font-label-bold uppercase text-on-surface-variant text-xs">Iscritti:</span><span class="text-primary font-bold">${pCount}</span></div>
            </div>
            <button onclick="toggleJoin(${ev.id}, ${isJoined})"
              class="w-full border-2 ${isJoined ? 'border-primary bg-primary-container text-on-primary-container' : 'border-on-background hover:bg-on-background hover:text-white'} py-sm font-label-bold uppercase transition-all active:scale-95">
              ${isJoined ? '✓ Iscritto — Esci' : 'Iscriviti'}
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function toggleJoin(eventId, isJoined) {
      if (isJoined) {
        DB.leaveEvent(eventId, user.id);
        toast('Disiscritto dall\'evento');
      } else {
        DB.joinEvent(eventId, user.id);
        toast('Iscritto all\'evento!');
      }
      setTimeout(renderEvents, 500);
    }

    renderEvents();
  </script>
</body>
</html>
