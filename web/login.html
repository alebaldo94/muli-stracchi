<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — I Muli Stracchi ASD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🚴 I Muli Stracchi ASD</h1>
        <p>Portale associativo</p>
      </div>
      <div id="flash"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nome@esempio.it" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="submitBtn">
          Accedi
        </button>
      </form>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    // Già loggato → redirect
    if (Auth.token()) {
      const u = Auth.user();
      window.location.href = u && u.role === 'admin' ? 'admin/index.html' : 'member/index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Accesso in corso...';
      try {
        const data = await API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        Auth.save(data.token, data.user);
        window.location.href = data.user.role === 'admin' ? 'admin/index.html' : 'member/index.html';
      } catch (err) {
        flash(err.message || 'Credenziali non valide', 'err');
        btn.disabled = false;
        btn.textContent = 'Accedi';
      }
    });
  </script>
</body>
</html>
