<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — I Muli Stracchi ASD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div style="position:relative;z-index:1;width:100%;max-width:420px;padding:0 16px">

      <div style="text-align:center;margin-bottom:36px">
        <h1 style="font-family:'Lexend',sans-serif;font-size:44px;font-weight:900;font-style:italic;text-transform:uppercase;color:#ffe16d;line-height:1;letter-spacing:-.02em">I Muli Stracchi</h1>
        <p style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:#c8c6c5;margin-top:8px">Endurance &amp; Grit</p>
      </div>

      <div class="auth-card">
        <div style="border-bottom:1px solid var(--border);margin-bottom:24px;padding-bottom:16px">
          <h2 style="font-family:'Lexend',sans-serif;font-size:20px;font-weight:700;color:var(--text)">Accedi al portale</h2>
          <p style="font-size:13px;color:var(--muted);margin-top:4px">Inserisci le tue credenziali per continuare.</p>
        </div>
        <div id="flash"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="nome@esempio.it" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;padding:12px" id="submitBtn">
            ENTRA
          </button>
        </form>
      </div>

      <p style="text-align:center;color:#c8c6c5;font-size:11px;font-family:'Lexend',sans-serif;font-weight:600;margin-top:24px">© 2026 I Muli Stracchi ASD</p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (Auth.token()) {
      const u = Auth.user();
      window.location.href = u && u.role === 'admin' ? 'admin/index.html' : 'member/index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Accesso in corso...';
      try {
        const data = await API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        Auth.save(data.token, data.user);
        window.location.href = data.user.role === 'admin' ? 'admin/index.html' : 'member/index.html';
      } catch (err) {
        flash(err.message || 'Credenziali non valide', 'err');
        btn.disabled = false;
        btn.textContent = 'ENTRA';
      }
    });
  </script>
</body>
</html>
