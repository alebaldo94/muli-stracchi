<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profilo — I Muli Stracchi ASD</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div class="main">
      <div class="topbar"><h1>Il mio profilo</h1></div>
      <div class="content">
        <div id="flash"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <!-- Info personali -->
          <div class="card">
            <div class="card-header"><h3>Informazioni personali</h3></div>
            <div class="card-body" id="infoBlock">
              <div class="loading-overlay"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- Modifica dati -->
          <div class="card">
            <div class="card-header"><h3>Modifica dati</h3></div>
            <div class="card-body">
              <form id="profileForm">
                <div class="form-group"><label>Telefono</label><input type="text" id="fPhone"></div>
                <div class="form-group"><label>Indirizzo</label><input type="text" id="fAddress"></div>
                <div class="form-group"><label>Note</label><textarea id="fNotes" rows="3"></textarea></div>
                <hr>
                <div class="form-group"><label>Nuova password</label><input type="password" id="fPwd" placeholder="Lascia vuota per non cambiare"></div>
                <div class="form-group"><label>Conferma password</label><input type="password" id="fPwd2"></div>
                <button type="submit" class="btn btn-primary">Salva modifiche</button>
              </form>
            </div>
          </div>
        </div>

        <!-- Stato tessera -->
        <div class="card">
          <div class="card-header"><h3>Stato iscrizione</h3></div>
          <div class="card-body" id="membershipBlock">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Strava -->
        <div class="card">
          <div class="card-header">
            <h3 style="display:flex;align-items:center;gap:8px">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#FC4C02"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
              Strava
            </h3>
            <div id="stravaActions"></div>
          </div>
          <div class="card-body" id="stravaBlock">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script>
    if (!Auth.check()) { /* redirect */ }
    const user = Auth.user();
    document.getElementById('sidebar').innerHTML = renderSidebar('profilo');

    async function load() {
      const me = await API.getMember(user.id).catch(() => null);
      if (!me) return;

      // Info block
      document.getElementById('infoBlock').innerHTML = `
        <table style="width:100%;font-size:14px;border-collapse:collapse">
          ${row('Nome', me.name)}
          ${row('Email', me.email)}
          ${row('Telefono', me.phone)}
          ${row('Indirizzo', me.address)}
          ${row('Tipo socio', me.member_type)}
          ${row('Numero tessera', me.member_number)}
          ${row('Data iscrizione', fmtDate(me.join_date))}
        </table>
      `;

      // Pre-fill form
      document.getElementById('fPhone').value   = me.phone   || '';
      document.getElementById('fAddress').value = me.address || '';
      document.getElementById('fNotes').value   = me.notes   || '';

      // Membership block
      const td = me.membership_expiry ? daysUntil(me.membership_expiry) : null;
      const id = me.insurance_expiry  ? daysUntil(me.insurance_expiry)  : null;
      document.getElementById('membershipBlock').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
          <div>
            <div class="text-muted" style="margin-bottom:4px">Tessera</div>
            ${expiryBadge(me.membership_expiry)}
          </div>
          <div>
            <div class="text-muted" style="margin-bottom:4px">Assicurazione</div>
            ${me.insurance ? expiryBadge(me.insurance_expiry) : '<span class="badge badge-err">Non registrata</span>'}
          </div>
          <div>
            <div class="text-muted" style="margin-bottom:4px">Livello</div>
            ${levelBadge(me.level)}
          </div>
        </div>
      `;
    }

    function row(label, val) {
      return `<tr>
        <td style="padding:7px 0;color:#666;width:40%;border-bottom:1px solid #f0f0f0">${label}</td>
        <td style="padding:7px 0;border-bottom:1px solid #f0f0f0"><strong>${val || '—'}</strong></td>
      </tr>`;
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd  = document.getElementById('fPwd').value;
      const pwd2 = document.getElementById('fPwd2').value;
      if (pwd && pwd !== pwd2) { flash('Le password non coincidono.', 'err'); return; }

      const payload = {
        phone:   document.getElementById('fPhone').value || null,
        address: document.getElementById('fAddress').value || null,
        notes:   document.getElementById('fNotes').value || null,
      };
      if (pwd) payload.password = pwd;

      try {
        await API.updateMember(user.id, payload);
        flash('Profilo aggiornato.', 'ok');
        document.getElementById('fPwd').value  = '';
        document.getElementById('fPwd2').value = '';
        load();
      } catch (err) { flash(err.message, 'err'); }
    });

    async function loadStrava() {
      const status = await apiFetch('/strava/status').catch(() => null);
      const sb = document.getElementById('stravaBlock');
      const sa = document.getElementById('stravaActions');

      // Leggi parametro URL per feedback post-OAuth
      const params = new URLSearchParams(window.location.search);
      const stravaResult = params.get('strava');
      if (stravaResult === 'connected') flash('Strava connesso con successo!', 'ok');
      if (stravaResult === 'error')     flash('Errore durante la connessione a Strava.', 'err');
      if (stravaResult === 'denied')    flash('Autorizzazione Strava negata.', 'warn');

      if (!status?.connected) {
        sb.innerHTML = '<p class="text-muted">Account Strava non connesso. Collega il tuo account per importare automaticamente le uscite.</p>';
        sa.innerHTML = `<button class="btn btn-sm" style="background:#FC4C02;color:#fff" onclick="connectStrava()">Connetti Strava</button>`;
      } else {
        sb.innerHTML = `
          <p style="font-size:14px;margin-bottom:12px">Account connesso (Athlete ID: ${status.athlete_id})</p>
          <button class="btn btn-primary btn-sm" onclick="syncStrava()" id="syncBtn">↓ Sincronizza uscite</button>
          <span id="syncResult" style="margin-left:12px;font-size:13px"></span>
        `;
        sa.innerHTML = `<button class="btn btn-outline btn-sm" onclick="disconnectStrava()">Disconnetti</button>`;
      }
    }

    async function connectStrava() {
      try {
        const data = await apiFetch('/strava/auth-url');
        window.location.href = data.url;
      } catch (err) { flash(err.message, 'err'); }
    }

    async function syncStrava() {
      const btn = document.getElementById('syncBtn');
      const res = document.getElementById('syncResult');
      btn.disabled = true; btn.textContent = 'Sincronizzazione...';
      res.textContent = '';
      try {
        const data = await apiFetch('/strava/sync', { method: 'POST' });
        res.textContent = `✓ Importate: ${data.imported}, già presenti: ${data.skipped}`;
        res.style.color = 'var(--green)';
        flash(`Sync completato: ${data.imported} nuove uscite importate.`, 'ok');
      } catch (err) {
        res.textContent = err.message;
        res.style.color = 'var(--red)';
      } finally {
        btn.disabled = false; btn.textContent = '↓ Sincronizza uscite';
      }
    }

    async function disconnectStrava() {
      if (!confirm('Disconnettere l\'account Strava?')) return;
      try {
        await apiFetch('/strava/disconnect', { method: 'DELETE' });
        flash('Strava disconnesso.', 'ok');
        loadStrava();
      } catch (err) { flash(err.message, 'err'); }
    }

    load();
    loadStrava();
  </script>
</body>
</html>
