services:

  muli-postgres:
    image: postgres:16-alpine
    container_name: muli-postgres
    environment:
      POSTGRES_DB:       muli_stracchi
      POSTGRES_USER:     muli
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muli2024}
    volumes:
      - muli_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    restart: unless-stopped
    networks:
      - muli-net

  muli-backend:
    build: ./backend
    container_name: muli-backend
    environment:
      DB_HOST:     muli-postgres
      DB_PORT:     5432
      DB_NAME:     muli_stracchi
      DB_USER:     muli
      DB_PASSWORD: ${DB_PASSWORD:-muli2024}
      JWT_SECRET:  ${JWT_SECRET:-dev_secret_change_in_prod}
      PORT:        3000
    depends_on:
      - muli-postgres
    restart: unless-stopped
    networks:
      - muli-net

  muli-web:
    image: nginx:alpine
    container_name: muli-stracchi
    ports:
      - "8088:80"
    volumes:
      - ./poc:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - muli-backend
    restart: unless-stopped
    networks:
      - muli-net

volumes:
  muli_postgres_data:

networks:
  muli-net:
    driver: bridge
